<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>QuantCore Pro | Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            gray: {
              750: '#2d3748',
              850: '#1a202c',
              900: '#111827',
              950: '#050505', // Deep black for terminal bg
            },
            terminal: {
              bg: '#000000',
              panel: '#111111',
              border: '#333333',
              text: '#e0e0e0',
              accent: '#ff9900', // Bloomberg-ish amber
              success: '#00ff00', // Terminal Green
              error: '#ff3333',   // Terminal Red
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Terminal Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid #333;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border: 1px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    ::-webkit-scrollbar-corner {
      background: #000;
    }

    body {
      background-color: #000000;
      color: #e5e7eb;
      font-feature-settings: "ss01", "ss02", "cv01", "cv02";
      -webkit-font-smoothing: antialiased;
    }

    .terminal-text {
      text-shadow: 0 0 1px rgba(0, 0, 0, 0.5);
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
